<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnosGo - Monitor IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,800;1,400;1,800&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #020617;
            color: white;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(96, 165, 250, 0.8);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            animation: scanMove 3s infinite linear;
        }

        @keyframes scanMove {
            0% { top: 10%; }
            100% { top: 90%; }
        }

        .pulse-soft { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        input[type='range'] {
            -webkit-appearance: none;
            appearance: none;
            background: #1e293b;
            height: 8px;
            border-radius: 10px;
        }

        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #3b82f6;
            border: 4px solid #000;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- LOGIN / FORMULARIO PACIENTE -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-lg flex flex-col items-center gap-12 text-center">
            <div class="flex flex-col items-center italic">
                <span class="text-white font-black tracking-[0.5em] text-lg mb-4">DIAGNOS</span>
                <div class="relative w-48 h-48 flex items-center justify-center">
                    <span class="text-white font-black text-5xl absolute -left-12 bottom-12">G</span>
                    <div id="main-logo-svg" class="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.6)]"></div>
                    <span class="text-white font-black text-5xl absolute -right-12 bottom-12">O</span>
                </div>
            </div>

            <div class="w-full max-w-md bg-[#0a0f1a]/80 p-8 rounded-[2rem] border border-white/10 backdrop-blur-md shadow-2xl space-y-4">
                <input type="text" id="input-id" placeholder="ID PACIENTE" class="w-full bg-black/40 border border-slate-800 rounded-xl p-4 text-xs text-center outline-none focus:border-blue-500 font-mono text-white tracking-widest uppercase">
                <input type="text" id="input-doctor" placeholder="MÉDICO FACULTATIVO" class="w-full bg-black/40 border border-slate-800 rounded-xl p-4 text-xs text-center outline-none focus:border-blue-500 font-mono text-white tracking-widest uppercase">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="input-date" value="2026-03-03" class="bg-black/40 border border-slate-800 rounded-xl p-3 text-[10px] text-white font-mono">
                    <input type="password" id="input-pin" placeholder="PIN" class="bg-black/40 border border-slate-800 rounded-xl p-3 text-xs text-center font-mono text-white tracking-[0.5em]">
                </div>
                <button id="btn-login" class="w-full bg-blue-600/20 hover:bg-blue-600 border border-blue-500/30 py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.3em] transition-all flex items-center justify-center gap-2">
                    <i data-lucide="user-check"></i> Iniciar Sesión
                </button>
            </div>
        </div>
    </div>

    <!-- MONITOR PRINCIPAL -->
    <div id="main-monitor" class="hidden w-full max-w-6xl aspect-[16/9] bg-slate-900 rounded-[3rem] p-2 border-[12px] border-slate-800 shadow-2xl relative overflow-hidden transition-all duration-500">
        <div class="flex h-full bg-black text-white relative">
            
            <!-- MENU LATERAL -->
            <div class="w-24 border-r border-blue-500/20 bg-slate-950 flex flex-col items-center py-8 gap-8 relative z-50">
                <button onclick="switchTab('scan')" id="nav-scan" class="nav-btn text-blue-500 flex flex-col items-center gap-1">
                    <i data-lucide="activity"></i>
                    <span class="text-[7px] font-black">ESCANEAR</span>
                </button>
                <button onclick="switchTab('tests')" id="nav-tests" class="nav-btn text-slate-600 flex flex-col items-center gap-1">
                    <i data-lucide="layers"></i>
                    <span class="text-[7px] font-black">PRUEBAS</span>
                </button>
                <button onclick="switchTab('history')" id="nav-history" class="nav-btn text-slate-600 flex flex-col items-center gap-1">
                    <i data-lucide="history"></i>
                    <span class="text-[7px] font-black">HISTORIAL</span>
                </button>
                <button onclick="switchTab('settings')" id="nav-settings" class="nav-btn text-slate-600 flex flex-col items-center gap-1">
                    <i data-lucide="settings"></i>
                    <span class="text-[7px] font-black">AJUSTES</span>
                </button>

                <div class="mt-auto mb-2 flex flex-col items-center gap-6">
                    <div class="relative group">
                        <button class="text-slate-600 hover:text-blue-400"><i data-lucide="user"></i></button>
                        <!-- Tooltip Perfil -->
                        <div id="profile-popover" class="hidden absolute bottom-0 left-24 w-[320px] bg-slate-900 border border-blue-500/30 rounded-3xl p-6 shadow-2xl z-[100] backdrop-blur-xl">
                            <div class="flex items-center gap-4 mb-6 border-b border-blue-500/20 pb-4">
                                <img id="profile-img" src="" class="w-16 h-16 rounded-2xl bg-slate-800 border border-blue-500/30">
                                <div>
                                    <h4 class="text-[10px] text-blue-500 font-black">EXPEDIENTE IA</h4>
                                    <span id="profile-id" class="text-sm font-black italic"></span>
                                </div>
                            </div>
                            <div id="profile-details" class="space-y-3 text-[10px]"></div>
                        </div>
                    </div>
                    <button onclick="logout()" class="text-red-500/40 hover:text-red-500"><i data-lucide="power"></i></button>
                </div>
            </div>

            <!-- CONTENIDO -->
            <div class="flex-1 flex flex-col bg-gradient-to-br from-black to-slate-950 overflow-hidden">
                <!-- Header -->
                <div class="flex justify-between items-center px-6 py-4 bg-slate-900 border-b border-blue-500/30">
                    <div class="flex items-center gap-3">
                        <div id="mini-logo" class="w-10 h-10"></div>
                        <div class="flex flex-col leading-none">
                            <span class="text-[8px] text-white font-black">DIAGNOS</span>
                            <span class="text-blue-500 font-black text-sm">G O</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <span id="display-id" class="text-[10px] font-black text-blue-400"></span>
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            <span id="display-test" class="text-[8px] text-slate-500 tracking-[0.2em]">RADIOGRAFÍA</span>
                        </div>
                    </div>
                </div>

                <!-- Tabs Containers -->
                <div id="tab-content" class="flex-1 p-6 relative overflow-y-auto">
                    
                    <!-- SCAN TAB -->
                    <div id="tab-scan" class="h-full flex flex-col gap-6">
                        <div class="flex-1 bg-slate-950 rounded-[2.5rem] border border-blue-500/20 relative overflow-hidden group">
                            <video id="video-element" class="hidden w-full h-full object-cover opacity-60 brightness-110 grayscale" autoplay playsinline></video>
                            
                            <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/50">
                                <i data-lucide="scan" class="w-20 h-20 text-blue-500/10 pulse-soft"></i>
                                <div class="mt-4 px-4 py-2 border border-blue-500/20 rounded-full bg-blue-500/5 text-[10px] text-blue-400 font-bold">HARDWARE CONECTADO</div>
                            </div>

                            <!-- Overlay escaneo -->
                            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                                <div class="w-48 h-48 border border-blue-500/20 rounded-full flex items-center justify-center pulse-soft">
                                    <i data-lucide="crosshair" class="text-blue-500/40 w-8 h-8"></i>
                                </div>
                                <div class="absolute top-10 left-10 w-8 h-8 border-t-2 border-l-2 border-blue-500/30"></div>
                                <div class="absolute top-10 right-10 w-8 h-8 border-t-2 border-r-2 border-blue-500/30"></div>
                                <div class="absolute bottom-10 left-10 w-8 h-8 border-b-2 border-l-2 border-blue-500/30"></div>
                                <div class="absolute bottom-10 right-10 w-8 h-8 border-b-2 border-r-2 border-blue-500/30"></div>
                            </div>

                            <!-- Cargador Análisis -->
                            <div id="analyzer-overlay" class="hidden absolute inset-0 bg-blue-900/30 backdrop-blur-xl flex flex-col items-center justify-center z-[60]">
                                <i data-lucide="loader-2" class="animate-spin w-16 h-16 text-blue-300"></i>
                                <span id="analyzer-percent" class="text-4xl font-black italic mt-2">0%</span>
                                <span class="text-[10px] tracking-[0.8em] mt-4 animate-pulse">RECONOCIENDO_ANATOMÍA...</span>
                            </div>

                            <!-- Resultado -->
                            <div id="result-overlay" class="hidden absolute inset-x-4 bottom-4 top-4 bg-slate-950/95 p-6 rounded-[2rem] border-2 border-blue-500/40 z-50 overflow-y-auto flex flex-col md:flex-row gap-6">
                                <div class="flex-1 rounded-2xl border border-blue-500/20 overflow-hidden bg-black flex items-center justify-center relative">
                                    <img id="result-img" class="w-full h-full object-contain">
                                    <div class="absolute top-2 left-2 bg-blue-600 px-2 py-0.5 rounded text-[8px] font-black">AI_GEN_VISUAL</div>
                                </div>
                                <div class="flex-1 flex flex-col justify-center">
                                    <div class="flex justify-between items-center mb-2">
                                        <span id="result-badge" class="bg-blue-600/20 text-blue-400 text-[8px] px-3 py-1 rounded-full font-black italic"></span>
                                        <i data-lucide="check-circle-2" class="text-green-500 w-6 h-6"></i>
                                    </div>
                                    <h2 id="result-diagnosis" class="text-2xl font-black italic text-white mb-4 leading-tight border-b border-white/10 pb-4"></h2>
                                    <div class="space-y-4">
                                        <div class="flex items-center gap-4">
                                            <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                                <div id="result-conf-bar" class="h-full bg-green-500" style="width: 0%"></div>
                                            </div>
                                            <p id="result-conf-text" class="text-xs text-green-400 font-bold tracking-tighter"></p>
                                        </div>
                                        <button onclick="closeResult()" class="text-[10px] text-slate-500 hover:text-white underline underline-offset-4 tracking-widest uppercase">Nuevo escaneo</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-6 h-28">
                            <div class="flex-1 bg-slate-900/60 rounded-[2rem] p-5 border border-white/5 flex flex-col justify-between">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[8px] text-slate-500">HARDWARE_SIGNAL</span>
                                    <span id="signal-status" class="text-[8px] text-blue-500 font-bold">ESPERA</span>
                                </div>
                                <div id="wave-container" class="flex gap-1.5 h-full items-end"></div>
                            </div>
                            <button id="btn-scan-main" onclick="handleScanAction()" class="w-1/3 bg-blue-600 rounded-[2rem] font-black text-xs hover:bg-blue-500 active:scale-95 transition-all shadow-2xl border-t border-white/20 flex flex-col items-center justify-center gap-1">
                                <i data-lucide="camera" class="mb-1"></i>
                                <span id="btn-scan-text">CONECTAR</span>
                            </button>
                        </div>
                    </div>

                    <!-- PRUEBAS TAB -->
                    <div id="tab-tests" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Cards se generan vía JS -->
                    </div>

                    <!-- HISTORIAL TAB -->
                    <div id="tab-history" class="hidden flex flex-col gap-6 h-full">
                        <div class="flex items-center justify-between border-b border-blue-500/20 pb-4">
                            <h2 class="text-xl font-black italic flex items-center gap-3"><i data-lucide="clock" class="text-blue-500"></i> HISTORIAL DE SESIÓN</h2>
                            <span id="history-patient-id" class="text-[10px] text-slate-500"></span>
                        </div>
                        <div id="history-list" class="flex-1 overflow-y-auto space-y-4"></div>
                    </div>

                    <!-- AJUSTES TAB -->
                    <div id="tab-settings" class="hidden max-w-2xl mx-auto w-full bg-slate-900/40 p-10 rounded-[3rem] border border-white/5 space-y-10">
                        <div class="flex items-center gap-4 border-b border-blue-500/20 pb-6">
                           <i data-lucide="sliders" class="text-blue-400"></i>
                           <h2 class="text-2xl font-black italic">Configuración de IA</h2>
                        </div>
                        <div class="space-y-8">
                            <div class="space-y-4">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-slate-400">UMBRAL DE CONFIANZA</span>
                                    <span id="range-val" class="text-blue-400 font-black text-2xl">95%</span>
                                </div>
                                <input type="range" min="70" max="99" value="95" oninput="updateConfidence(this.value)" class="w-full">
                            </div>
                        </div>
                        <button onclick="stopCameraHardware()" class="w-full flex justify-between items-center p-5 bg-red-500/5 border border-red-500/10 rounded-2xl text-red-500 uppercase">
                            <span class="text-xs font-black">Apagar Hardware de Captura</span>
                            <i data-lucide="refresh-cw"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Estado Global ---
        let currentPatient = null;
        let testType = 'RADIOGRAFÍA';
        let isAnalyzing = false;
        let scanHistory = [];
        let cameraActive = false;
        let confidenceLevel = 95;
        const apiKey = ""; // La plataforma lo inyectará

        // --- Configuración Visual ---
        const svgContent = `
            <svg viewBox="0 0 100 100" class="w-full h-full">
                <path d="M50 88 C18 68 5 48 5 28 A15 15 0 0 1 48 28 L50 30 L52 28 A15 15 0 0 1 95 28 C95 48 82 68 50 88 Z" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
                <path d="M15 45 L35 45 L40 35 L45 55 L50 45 L55 45 L60 30 L65 60 L70 45 L85 45" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 2" />
                <g fill="white">
                    <circle cx="50" cy="35" r="5" />
                    <line x1="50" y1="40" x2="50" y2="60" stroke="white" stroke-width="4" />
                    <path d="M50 45 L35 32" stroke="white" stroke-width="4" />
                    <path d="M50 45 L65 32" stroke="white" stroke-width="4" />
                    <path d="M50 60 L40 80" stroke="white" stroke-width="4" />
                    <path d="M50 60 L60 80" stroke="white" stroke-width="4" />
                </g>
                <line x1="10" y1="25" x2="90" y2="25" stroke="#60a5fa" stroke-width="2" opacity="0.8" class="scan-line"></line>
            </svg>`;

        document.getElementById('main-logo-svg').innerHTML = svgContent;
        document.getElementById('mini-logo').innerHTML = svgContent;
        lucide.createIcons();

        // --- Wave Visualizer ---
        const waveContainer = document.getElementById('wave-container');
        for(let i=0; i<40; i++) {
            const bar = document.createElement('div');
            bar.className = 'flex-1 bg-blue-500/30 rounded-full h-[5%] transition-all duration-300';
            waveContainer.appendChild(bar);
        }

        setInterval(() => {
            if(!cameraActive) return;
            waveContainer.childNodes.forEach(bar => {
                bar.style.height = (20 + Math.random() * 80) + '%';
            });
        }, 400);

        // --- Lógica Login ---
        document.getElementById('btn-login').addEventListener('click', () => {
            const id = document.getElementById('input-id').value;
            const doctor = document.getElementById('input-doctor').value;
            const pin = document.getElementById('input-pin').value;

            if(id.length >= 4 && pin === "0000") {
                loginSuccess(id, doctor);
            } else {
                alert("DATOS INVÁLIDOS");
            }
        });

        function loginSuccess(id, doctor) {
            currentPatient = {
                id: id.toUpperCase(),
                doctor: doctor.toUpperCase(),
                birth: '1978',
                address: 'CALLE MAYOR 45, MADRID',
                pathologies: 'HIPERTENSIÓN ARTERIAL',
                operations: 'APENDICECTOMÍA (2015)',
                photo: `https://api.dicebear.com/7.x/avataaars/svg?seed=${id}`
            };

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-monitor').classList.remove('hidden');
            
            document.getElementById('display-id').textContent = `ID: ${currentPatient.id}`;
            document.getElementById('profile-id').textContent = currentPatient.id;
            document.getElementById('profile-img').src = currentPatient.photo;
            document.getElementById('history-patient-id').textContent = `PACIENTE: ${currentPatient.id}`;
            
            document.getElementById('profile-details').innerHTML = `
                <div class="flex flex-col"><span class="text-slate-500">NACIMIENTO</span><b>${currentPatient.birth}</b></div>
                <div class="flex flex-col"><span class="text-slate-500">DIRECCIÓN</span><b>${currentPatient.address}</b></div>
                <div class="flex flex-col text-red-400"><span class="text-slate-500">PATOLOGÍAS</span><b>${currentPatient.pathologies}</b></div>
                <div class="flex flex-col text-orange-400"><span class="text-slate-500">OPERACIONES</span><b>${currentPatient.operations}</b></div>
            `;
            
            renderTestsTab();
        }

        // --- Lógica Cámara ---
        async function handleScanAction() {
            if(!cameraActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('video-element').srcObject = stream;
                    document.getElementById('video-element').classList.remove('hidden');
                    document.getElementById('camera-placeholder').classList.add('hidden');
                    cameraActive = true;
                    document.getElementById('btn-scan-text').textContent = "ESCANEAR";
                    document.getElementById('signal-status').textContent = "ACTIVO";
                } catch(e) {
                    // Fallback simulación
                    document.getElementById('camera-placeholder').innerHTML = `<p class="text-[10px] text-orange-400 font-bold">MODO SIMULACIÓN ACTIVO</p>`;
                    cameraActive = true;
                    document.getElementById('btn-scan-text').textContent = "ESCANEAR";
                    document.getElementById('signal-status').textContent = "SIMULACIÓN";
                }
            } else {
                startAnalysis();
            }
        }

        function stopCameraHardware() {
            const video = document.getElementById('video-element');
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            video.classList.add('hidden');
            document.getElementById('camera-placeholder').classList.remove('hidden');
            cameraActive = false;
            document.getElementById('btn-scan-text').textContent = "CONECTAR";
            document.getElementById('signal-status').textContent = "ESPERA";
        }

        // --- Lógica Análisis ---
        async function startAnalysis() {
            if(isAnalyzing) return;
            isAnalyzing = true;
            
            const overlay = document.getElementById('analyzer-overlay');
            const percentText = document.getElementById('analyzer-percent');
            overlay.classList.remove('hidden');

            let p = 0;
            const interval = setInterval(() => {
                p += 5;
                percentText.textContent = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    finishAnalysis();
                }
            }, 100);
        }

        async function finishAnalysis() {
            const parts = ["BRAZO", "PIERNA", "TORAX", "CABEZA", "MANO"];
            const part = parts[Math.floor(Math.random() * parts.length)];
            
            const diagnosisMap = {
                'RADIOGRAFÍA': 'FRACTURA CERRADA DETECTADA',
                'ECOGRAFÍA': 'INFLAMACIÓN DE TEJIDO BLANDO',
                'RESONANCIA': 'LESIÓN POR ESTRES LIGAMENTOSO'
            };

            const diagnosis = `${diagnosisMap[testType]} EN ${part}`;
            const conf = (confidenceLevel + (Math.random() * (100 - confidenceLevel))).toFixed(1) + '%';
            
            // Generar Imagen con Imagen 4.0 (usando el protocolo del sistema)
            let imgUrl = `https://placehold.co/600x400/0f172a/3b82f6?text=${testType}+${part}`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        instances: { prompt: `Realistic medical ${testType} showing ${diagnosis}` },
                        parameters: { sampleCount: 1 }
                    })
                });
                const result = await response.json();
                imgUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch(e) {}

            const resultObj = {
                id: Date.now(),
                patientId: currentPatient.id,
                type: testType,
                part: part,
                diagnosis: diagnosis,
                confidence: conf,
                image: imgUrl,
                timestamp: new Date().toLocaleTimeString()
            };

            scanHistory.unshift(resultObj);
            showResult(resultObj);
        }

        function showResult(res) {
            isAnalyzing = false;
            document.getElementById('analyzer-overlay').classList.add('hidden');
            document.getElementById('result-overlay').classList.remove('hidden');
            
            document.getElementById('result-img').src = res.image;
            document.getElementById('result-badge').textContent = `${res.type} / ${res.part}`;
            document.getElementById('result-diagnosis').textContent = res.diagnosis;
            document.getElementById('result-conf-text').textContent = res.confidence;
            document.getElementById('result-conf-bar').style.width = res.confidence;
            
            updateHistoryUI();
        }

        function closeResult() {
            document.getElementById('result-overlay').classList.add('hidden');
        }

        // --- Navegación ---
        function switchTab(tab) {
            const tabs = ['scan', 'tests', 'history', 'settings'];
            tabs.forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.replace('text-blue-500', 'text-slate-600');
            });

            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.replace('text-slate-600', 'text-blue-500');
            
            if(tab === 'tests') renderTestsTab();
            if(tab === 'history') updateHistoryUI();
        }

        function renderTestsTab() {
            const tests = [
                { id: 'ECOGRAFÍA', icon: 'waves', desc: 'DIAGNÓSTICO POR ULTRASONIDO.' },
                { id: 'RADIOGRAFÍA', icon: 'zap', desc: 'EXPLORACIÓN POR RAYOS X.' },
                { id: 'RESONANCIA', icon: 'magnet', desc: 'IMAGENOLOGÍA MAGNÉTICA.' }
            ];

            const container = document.getElementById('tab-tests');
            container.innerHTML = tests.map(t => `
                <div onclick="selectTest('${t.id}')" class="p-8 rounded-[2.5rem] border-2 cursor-pointer transition-all flex flex-col items-center gap-6 text-center group ${testType === t.id ? 'bg-blue-600/20 border-blue-500 shadow-lg' : 'bg-slate-900/40 border-slate-800 hover:border-blue-500/40'}">
                    <div class="w-20 h-20 rounded-full flex items-center justify-center ${testType === t.id ? 'bg-blue-500' : 'bg-slate-800 text-slate-500 group-hover:text-blue-400'}">
                        <i data-lucide="${t.icon}" style="width:40px; height:40px;"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="font-black italic text-xl">${t.id}</h3>
                        <p class="text-[10px] text-slate-500 normal-case px-4">${t.desc}</p>
                    </div>
                    ${testType === t.id ? '<span class="text-[10px] bg-blue-600 px-6 py-1.5 rounded-full font-black">ACTIVA</span>' : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectTest(id) {
            testType = id;
            document.getElementById('display-test').textContent = id;
            switchTab('scan');
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            if(scanHistory.length === 0) {
                list.innerHTML = `<div class="opacity-20 flex flex-col items-center py-20"><i data-lucide="clipboard-list" style="width:48px; height:48px;"></i><p class="mt-4">SIN REGISTROS</p></div>`;
            } else {
                list.innerHTML = scanHistory.map(item => `
                    <div class="bg-slate-900/40 border border-white/5 rounded-3xl p-6 flex gap-6 items-center hover:border-blue-500/30 transition-all group">
                        <img src="${item.image}" class="w-24 h-24 bg-black rounded-xl object-cover border border-slate-800">
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[8px] bg-blue-600/30 text-blue-400 px-2 py-0.5 rounded font-black">${item.type}</span>
                                <span class="text-[10px] text-slate-500 italic">${item.timestamp}</span>
                            </div>
                            <h3 class="text-sm font-black italic text-white">${item.diagnosis}</h3>
                            <span class="text-[10px] text-green-500 font-bold">CONFIANZA: ${item.confidence}</span>
                        </div>
                        <button onclick="viewPastResult(${item.id})" class="p-3 bg-slate-800 rounded-full opacity-0 group-hover:opacity-100"><i data-lucide="file-text"></i></button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function viewPastResult(id) {
            const item = scanHistory.find(i => i.id === id);
            if(item) {
                switchTab('scan');
                showResult(item);
            }
        }

        function updateConfidence(val) {
            confidenceLevel = parseInt(val);
            document.getElementById('range-val').textContent = val + '%';
        }

        function logout() {
            location.reload();
        }

        // Toggle perfil
        document.querySelector('[data-lucide="user"]').parentElement.addEventListener('mouseenter', () => {
            document.getElementById('profile-popover').classList.remove('hidden');
        });
        document.querySelector('[data-lucide="user"]').parentElement.addEventListener('mouseleave', () => {
            document.getElementById('profile-popover').classList.add('hidden');
        });

    </script>
</body>
</html>
